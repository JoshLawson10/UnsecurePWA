{% extends 'layout.html' %} {% block content %}
<h1>Sign Up</h1>
<form action="{{ url_for('signup') }}" method="POST" class="box">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="input__wrapper">
    <input type="text" name="username" placeholder="Username" class="input__field" maxlength="50"
      autocomplete="username" required />
  </div>
  <div class="input__wrapper">
    <input type="email" name="email" placeholder="Email address" class="input__field" maxlength="254"
      autocomplete="email" required />
  </div>
  <div class="input__wrapper">
    <input type="password" name="password" placeholder="Password" class="input__field" maxlength="128"
      autocomplete="new-password" required />
  </div>
  <div class="input__wrapper">
    <input type="date" name="dob" placeholder="Date of Birth" class="input__field" />
  </div>
  <div class="input__wrapper">
    <button type="submit" class="btn">Create Account</button>
  </div>
</form>
{% if msg %}
<div class="msg">{{ msg }}</div>
{% endif %}
{% endblock %}
