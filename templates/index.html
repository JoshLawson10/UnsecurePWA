{% extends 'layout.html' %} {% block content %}
<h1>Login</h1>
<form action="{{ url_for('home') }}" method="post" class="box">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="input__wrapper">
    <input type="text" name="username" id="username" placeholder="Username" class="input__field" maxlength="50"
      autocomplete="username" required />
  </div>
  <div class="input__wrapper">
    <input type="password" name="password" id="password" placeholder="Password" class="input__field" maxlength="128"
      autocomplete="current-password" required />
  </div>
  <div class="input__wrapper">
    <input type="submit" class="btn" value="Log In" />
  </div>
</form>
{% if msg %}
<div class="msg">{{ msg }}</div>
{% endif %}
{% endblock %}
