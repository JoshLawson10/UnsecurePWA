{% extends 'layout.html' %} {% block content %}

<div class="form-card">
  <div class="form-card-header">
    <h1>Sign in</h1>
    <p>Enter your credentials to access your account</p>
  </div>

  <div class="form-card-body">
    <form action="{{ url_for('home') }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="field">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="your_username" maxlength="50"
          autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••••" maxlength="128"
          autocomplete="current-password" required />
      </div>

      {% if msg %}
      <div class="msg">{{ msg }}</div>
      {% endif %}

      <div class="field">
        <button type="submit" class="btn btn-full">Continue →</button>
      </div>
    </form>
  </div>

  <div class="form-footer">
    Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
  </div>
</div>

{% endblock %}
