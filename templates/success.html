{% extends 'layout.html' %}
{% block content %}

<div class="welcome-banner">
  <div class="welcome-avatar">{{ value[0]|upper }}</div>
  <div class="welcome-text">
    <h1>Welcome back, {{ value }}!</h1>
    <p>Share your thoughts with the community below</p>
  </div>
</div>

<div class="success-grid">
  <div>
    <div class="section-title">Submit feedback</div>
    <div class="card feedback-card">
      <form action="{{ url_for('addFeedback') }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="feedback">Your message</label>
          <textarea name="feedback" id="feedback" placeholder="Share your thoughts, ideas, or feedback…" maxlength="500"
            required></textarea>
        </div>
        <button type="submit" class="btn btn-full">Post feedback</button>
      </form>
    </div>
  </div>

  <div>
    <div class="section-title">Community feedback</div>
    {% include "partials/success_feedback.html" %}
  </div>
</div>

{% endblock %}
